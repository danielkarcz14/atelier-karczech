# Astro + @astrojs/netlify adapter. Build vyprodukuje statický web do dist/
# a serverless funkce (Keystatic admin) spravuje adaptér automaticky.
[build]
  command = "astro build"
  publish = "dist"

[functions]
  # Vlastní funkce kontaktního formuláře (nodemailer) bundluje esbuild.
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200
