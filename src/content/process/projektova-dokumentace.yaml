number: "03"
title: "Projektová dokumentace"
order: 3
body: "Po odsouhlasení architektonické studie připravíme projektovou dokumentaci zpracovanou do potřebné míry detailu, s důrazem na přesnost a návaznost jednotlivých profesí. V průběhu zpracování řešíme technické detaily v součinnosti s investorem i odbornými specialisty tak, aby výsledkem byla kompletní dokumentace v souladu se stavebním zákonem."
